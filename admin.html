<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Primelight Health Services</title>
    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .admin-header { background: linear-gradient(135deg, #007bff, #0056b3); color: white; padding: 2rem 0; }
        .form-card { margin-bottom: 2rem; }
        .submission-card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
        .attachment-link { color: #007bff; text-decoration: none; }
        .attachment-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header class="admin-header">
        <div class="container">
            <h1>Admin Panel</h1>
            <p>Manage form submissions and site content</p>
        </div>
    </header>

    <div class="container mt-4">
        <!-- Password Protection -->
        <div class="card form-card" id="authCard">
            <div class="card-header">
                <h5>Admin Access</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label for="adminPassword" class="form-label">Admin Password</label>
                    <input type="password" class="form-control" id="adminPassword" placeholder="Enter admin password">
                </div>
                <button class="btn btn-primary" onclick="authenticate()">Access Admin Panel</button>
            </div>
        </div>

        <!-- Main Admin Content -->
        <div id="adminContent" style="display: none;">
        <div class="card form-card">
            <div class="card-header">
                <h5>Netlify API Configuration</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <label for="siteId" class="form-label">Site ID</label>
                        <input type="text" class="form-control" id="siteId" value="e62d3e9d-1f74-46e8-82d6-50a6c26f6f30" readonly>
                    </div>
                    <div class="col-md-6">
                        <label for="apiToken" class="form-label">API Token</label>
                        <input type="password" class="form-control" id="apiToken" placeholder="Enter your Netlify API Token">
                    </div>
                </div>
                <button class="btn btn-primary mt-3" onclick="loadForms()">Load Forms</button>
            </div>
        </div>

        <!-- Forms List -->
        <div class="card form-card" id="formsCard" style="display: none;">
            <div class="card-header">
                <h5>Forms</h5>
            </div>
            <div class="card-body">
                <div id="formsList"></div>
            </div>
        </div>

        <!-- Submissions -->
        <div class="card form-card" id="submissionsCard" style="display: none;">
            <div class="card-header">
                <h5>Form Submissions</h5>
            </div>
            <div class="card-body">
                <div id="submissionsList"></div>
            </div>
        </div>

        <!-- Content Editor -->
        <div class="card form-card">
            <div class="card-header">
                <h5>Edit Site Content</h5>
            </div>
            <div class="card-body">
                <p><strong>Note:</strong> Edit text here and then choose <em>Save to Netlify</em> to publish via a deploy call.</p>
                <div class="mb-3">
                    <label for="welcomeText" class="form-label">Welcome Text</label>
                    <textarea class="form-control" id="welcomeText" rows="4">Your journey to better health starts here. Whether you're looking for physical, occupational, or speech therapy, we're here to help you achieve your goals. Contact us today to schedule your appointment!

Say goodbye to painful joints that limits your day to day activities!</textarea>
                </div>
                <button class="btn btn-secondary" onclick="saveContent()">Save Content (Local)</button>
                <button class="btn btn-success ms-2" onclick="saveContentToNetlify()">Save to Netlify (Deploy)</button>
                <div id="saveStatus" class="mt-2"></div>
            </div>
        </div>

        <!-- Image Upload -->
        <div class="card form-card">
            <div class="card-header">
                <h5>Upload Image to Netlify Blob Storage</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label for="imageFile" class="form-label">Choose Image</label>
                    <input type="file" class="form-control" id="imageFile" accept="image/*">
                </div>
                <button class="btn btn-primary" onclick="uploadImage()">Upload Image</button>
                <div id="uploadStatus" class="mt-2"></div>
                <div id="uploadedBlobUrl" class="mt-2"></div>
            </div>
        </div>
        </div>
    </div>

    <script>
        function authenticate() {
            const password = document.getElementById('adminPassword').value;
            if (password === 'primelight2024') {  // Change this password as needed
                document.getElementById('authCard').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
            } else {
                alert('Incorrect password');
            }
        }

        let forms = [];
        let siteId = '';
        let apiToken = '';

        function loadForms() {
            siteId = document.getElementById('siteId').value.trim();
            apiToken = document.getElementById('apiToken').value.trim();

            if (!apiToken) {
                alert('Please enter API Token');
                return;
            }

            // Save token for convenience (not secure)
            localStorage.setItem('netlifyToken', apiToken);

            fetch(`https://api.netlify.com/api/v1/sites/${siteId}/forms`, {
                headers: {
                    'Authorization': `Bearer ${apiToken}`
                }
            })
            .then(response => response.json())
            .then(data => {
                forms = data;
                displayForms();
                document.getElementById('formsCard').style.display = 'block';
            })
            .catch(error => {
                console.error('Error loading forms:', error);
                alert('Error loading forms. Check your credentials.');
            });
        }

        function displayForms() {
            const formsList = document.getElementById('formsList');
            formsList.innerHTML = '';

            forms.forEach(form => {
                const formDiv = document.createElement('div');
                formDiv.className = 'mb-3';
                formDiv.innerHTML = `
                    <h6>${form.name}</h6>
                    <p>${form.submissions} submissions</p>
                    <button class="btn btn-sm btn-outline-primary" onclick="loadSubmissions('${form.id}')">View Submissions</button>
                `;
                formsList.appendChild(formDiv);
            });
        }

        function loadSubmissions(formId) {
            fetch(`https://api.netlify.com/api/v1/sites/${siteId}/forms/${formId}/submissions`, {
                headers: {
                    'Authorization': `Bearer ${apiToken}`
                }
            })
            .then(response => response.json())
            .then(data => {
                displaySubmissions(data);
                document.getElementById('submissionsCard').style.display = 'block';
            })
            .catch(error => {
                console.error('Error loading submissions:', error);
                alert('Error loading submissions.');
            });
        }

        function displaySubmissions(submissions) {
            const submissionsList = document.getElementById('submissionsList');
            submissionsList.innerHTML = '';

            submissions.forEach(submission => {
                const submissionDiv = document.createElement('div');
                submissionDiv.className = 'submission-card';

                let content = `<h6>Submission ID: ${submission.id}</h6>`;
                content += `<p><strong>Created:</strong> ${new Date(submission.created_at).toLocaleString()}</p>`;

                for (const [key, value] of Object.entries(submission.data)) {
                    if (value && typeof value === 'object') {
                        const fileUrl = value.url || value.file || null;
                        const fileName = value.filename || value.name || key;
                        if (fileUrl) {
                            content += `<p><strong>${key}:</strong> <a href="${fileUrl}" class="attachment-link" target="_blank" rel="noopener">Download ${fileName}</a></p>`;
                        } else {
                            content += `<p><strong>${key}:</strong> ${JSON.stringify(value)}</p>`;
                        }
                    } else if (typeof value === 'string' && (value.startsWith('http://') || value.startsWith('https://'))) {
                        content += `<p><strong>${key}:</strong> <a href="${value}" class="attachment-link" target="_blank" rel="noopener">Download</a></p>`;
                    } else {
                        content += `<p><strong>${key}:</strong> ${value}</p>`;
                    }
                }

                submissionDiv.innerHTML = content;
                submissionsList.appendChild(submissionDiv);
            });
        }

        function saveContent() {
            const welcomeText = document.getElementById('welcomeText').value;
            localStorage.setItem('welcomeText', welcomeText);
            document.getElementById('saveStatus').innerHTML = '<div class="alert alert-success">Content saved locally!</div>';
            setTimeout(() => {
                document.getElementById('saveStatus').innerHTML = '';
            }, 3000);
        }

        async function saveContentToNetlify() {
            siteId = document.getElementById('siteId').value.trim();
            apiToken = document.getElementById('apiToken').value.trim();
            if (!siteId || !apiToken) {
                alert('Site ID and API Token are required to deploy to Netlify.');
                return;
            }

            const content = {
                heroTitle: document.getElementById('heroTitle') ? document.getElementById('heroTitle').value : 'WELCOME TO Primelight Health Services',
                heroText1: document.getElementById('welcomeText').value,
                heroText2: ''
            };

            const body = JSON.stringify(content, null, 2);

            try {
                // attempt direct file update endpoint (unofficial but often works)
                const directRes = await fetch(`https://api.netlify.com/api/v1/sites/${siteId}/files/site-content.json`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${apiToken}`,
                        'Content-Type': 'application/json'
                    },
                    body
                });

                if (directRes.ok) {
                    document.getElementById('saveStatus').innerHTML = '<div class="alert alert-success">site-content.json updated on Netlify. Refresh your site.</div>';
                    return;
                }

                // fallback to deploy API
                const hashBuffer = await crypto.subtle.digest('SHA-1', new TextEncoder().encode(body));
                const hash = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');

                const deployRes = await fetch(`https://api.netlify.com/api/v1/sites/${siteId}/deploys`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ files: { 'site-content.json': hash } })
                });

                if (!deployRes.ok) {
                    throw new Error('Deploy creation failed: ' + await deployRes.text());
                }

                const deployJson = await deployRes.json();
                if (!deployJson.required || !deployJson.required.includes('site-content.json')) {
                    document.getElementById('saveStatus').innerHTML = '<div class="alert alert-warning">Deploy created but no upload needed. Try refreshing the site.</div>';
                    return;
                }

                // Upload required file(s)
                const uploadUrl = deployJson.files && deployJson.files['site-content.json'];
                if (!uploadUrl) {
                    throw new Error('Upload URL not provided in deploy response.');
                }

                const putRes = await fetch(uploadUrl, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body
                });

                if (!putRes.ok) {
                    throw new Error('Upload of site-content.json failed: ' + await putRes.text());
                }

                document.getElementById('saveStatus').innerHTML = '<div class="alert alert-success">site-content.json deployed via Netlify deploy API. It may take a moment to go live.</div>';
            } catch (error) {
                console.error(error);
                document.getElementById('saveStatus').innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
            }
        }

        async function uploadImage() {
            siteId = document.getElementById('siteId').value.trim();
            apiToken = document.getElementById('apiToken').value.trim();
            if (!siteId || !apiToken) {
                alert('Site ID and API Token are required to upload images.');
                return;
            }

            const fileInput = document.getElementById('imageFile');
            if (!fileInput.files || fileInput.files.length === 0) {
                alert('Select an image first.');
                return;
            }

            const file = fileInput.files[0];
            const uploadUrl = `https://api.netlify.com/api/v1/blob`; // Netlify Blob API

            try {
                const res = await fetch(uploadUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiToken}`,
                        'Content-Type': file.type
                    },
                    body: file
                });

                if (!res.ok) {
                    throw new Error('Image upload failed: ' + (await res.text()));
                }

                const blobData = await res.json();
                const url = blobData.url || blobData.file_url || blobData.path;
                document.getElementById('uploadStatus').innerHTML = '<div class="alert alert-success">Upload successful.</div>';
                document.getElementById('uploadedBlobUrl').innerHTML = `<p>Blob URL: <a href="${url}" target="_blank" rel="noopener">${url}</a></p>`;
            } catch (err) {
                console.error(err);
                document.getElementById('uploadStatus').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
            }
        }

        // Load saved content on page load
        window.onload = function() {
            const savedToken = localStorage.getItem('netlifyToken');
            if (savedToken) {
                document.getElementById('apiToken').value = savedToken;
            }
            const savedText = localStorage.getItem('welcomeText');
            if (savedText) {
                document.getElementById('welcomeText').value = savedText;
            }
        };
    </script>

    <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
